<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Invincibles Co | Tax & Compliance Solutions</title>

<link rel="icon" href="favicon.ico">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f4f6fb;
}

/* NAVBAR */
.navbar {
  background: #1f2a6b;
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: #fff;
  margin: 0 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  position: relative;
  color: #fff;
  text-align: center;
}

.hero img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  filter: brightness(0.5);
}

.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.hero-text h1 {
  margin: 0;
  font-size: 28px;
}

/* SECTION */
.section {
  max-width: 900px;
  margin: auto;
  padding: 25px;
}

/* CARD */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* CAROUSEL */
.carousel {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.carousel img {
  width: 100%;
  display: none;
}

.carousel img.active {
  display: block;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #777;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Home</a>
  <a href="#">Tools</a>
  <a href="#">About</a>
</div>

<!-- HERO -->
<div class="hero">
  <img src="images/hero.jpg">
  <div class="hero-text">
    <h1>Invincibles Co</h1>
    <p>Smart Tax & Compliance Solutions</p>
  </div>
</div>

<!-- ABOUT -->
<div class="section">

  <div class="card">
    <img src="images/about.jpg">
    <h2>About Us</h2>
    <p>
      Invincibles Co simplifies taxation and compliance for professionals and businesses through structured tools and insights.
    </p>
  </div>

  <!-- CAROUSEL -->
  <div class="card">
    <h3>Our Work & Insights</h3>

    <div class="carousel">
      <img src="images/tax1.jpg" class="active">
      <img src="images/tax2.jpg">
      <img src="images/tax3.jpg">
    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © Invincibles Co
</div>

<script>

/* SIMPLE CAROUSEL */
let index = 0;
const images = document.querySelectorAll(".carousel img");

setInterval(() => {
  images[index].classList.remove("active");
  index = (index + 1) % images.length;
  images[index].classList.add("active");
}, 3000);

</script>

</body>
</html>
